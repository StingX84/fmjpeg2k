name: Conan Build and Test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # Recommended Python version

      - name: Setup Conan client
        uses: conan-io/setup-conan@v2
        with:
          conan-version: '2.x' # Use the latest Conan 2.x version
          cache-conan-packages: true # Enable caching for speed

      - name: Create default Conan profile (if not cached)
        # This step is conditional, only runs if the cache was a miss
        if: steps.setup-conan-client.outputs.cache-hit != 'true'
        run: conan profile detect

      - name: Install dependencies and build project
        run: conan create . --build=missing --update

